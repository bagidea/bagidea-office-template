<!doctype html>
<!--
  👋 Hello Office — the panel (the UI the user opens from the 🧩 Plugins list).
  A plain HTML file rendered in the office overlay. It talks to your server
  side over the same HTTP routes agents use, and listens on the office
  WebSocket so it stays live when an agent changes something.
  Keep the office dark theme so panels feel native.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hello Office</title>
<style>
  :root { --bg:#0c1322; --fg:#dbe7ff; --dim:#7e8db0; --accent:#5ec8ff; --card:#13203a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, "Segoe UI", sans-serif; background:var(--bg); color:var(--fg); padding:18px; }
  h1 { font-size:18px; margin:0 0 4px; }
  .sub { color:var(--dim); font-size:12px; margin-bottom:16px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .stat { background:var(--card); border-radius:12px; padding:12px 14px; }
  .stat .n { font-size:22px; font-weight:700; color:var(--accent); }
  .stat .l { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
  .agents { background:var(--card); border-radius:12px; padding:10px 14px; margin-bottom:16px; max-height:160px; overflow:auto; }
  .agents div { padding:4px 0; font-size:13px; border-bottom:1px solid #ffffff10; }
  .agents div:last-child { border:0; }
  .agents b { color:var(--accent); }
  .row { display:flex; gap:8px; }
  input, button { font:inherit; border-radius:10px; border:1px solid #ffffff22; padding:10px 12px; }
  input { flex:1; background:#0a1120; color:var(--fg); }
  button { background:var(--accent); color:#06101f; font-weight:700; border:0; cursor:pointer; }
  button:hover { filter:brightness(1.08); }
</style>
</head>
<body>
  <h1>👋 Hello Office</h1>
  <div class="sub">Live data pulled straight from the office you're running.</div>

  <div class="grid">
    <div class="stat"><div class="n" id="agentCount">–</div><div class="l">Agents</div></div>
    <div class="stat"><div class="n" id="greets">–</div><div class="l">Greets sent</div></div>
    <div class="stat"><div class="n" id="lang">–</div><div class="l">Language</div></div>
    <div class="stat"><div class="n" id="roleCount">–</div><div class="l">Roles</div></div>
  </div>

  <div class="agents" id="agents"></div>

  <div class="row">
    <input id="who" placeholder="Who to greet? (optional)" />
    <button id="greet">Greet the office</button>
  </div>

<script>
  // The plugin's own base path. /plugin/<id>/... — id is "hello" here.
  const BASE = "/plugin/hello";

  async function refresh() {
    const s = await (await fetch(BASE + "/state")).json();
    document.getElementById("agentCount").textContent = s.agentCount;
    document.getElementById("greets").textContent = s.greets;
    document.getElementById("lang").textContent = (s.language || "en").toUpperCase();
    document.getElementById("roleCount").textContent = (s.roles || []).length;
    const box = document.getElementById("agents");
    box.innerHTML = (s.agents || [])
      .map((a) => `<div><b>${a.name}</b> — ${a.role} <span style="color:#7e8db0">· ${a.id}</span></div>`)
      .join("") || `<div style="color:#7e8db0">No agents yet</div>`;
  }

  // Send a command — the SAME endpoint agents use.
  document.getElementById("greet").onclick = async () => {
    const who = document.getElementById("who").value.trim();
    await fetch(BASE + "/cmd", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ cmd: "greet", args: who }),
    });
    refresh();
  };

  // Stay live: when an agent drives the plugin, the office broadcasts an
  // event over the WebSocket and we re-read our state.
  try {
    const ws = new WebSocket("ws://127.0.0.1:8787/ws");
    ws.onmessage = (m) => {
      try {
        const e = JSON.parse(m.data);
        if (e.type === "plugin.event" && e.plugin === "hello") refresh();
      } catch {}
    };
  } catch {}

  refresh();
</script>
</body>
</html>
